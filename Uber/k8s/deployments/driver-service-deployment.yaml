#  What you MUST do before deploying
#    1. Replace image placeholders
#  In every Deployment file, replace <your-registry>/service-name:latest with your actual image. For Minikube you have two options:
#
#  Option A (easiest): eval $(minikube docker-env) then docker build — images are available locally, set imagePullPolicy: Never
#  Option B: Push to Docker Hub as yourname/user-service:latest

apiVersion: apps/v1
kind: Deployment
metadata:
  name: driver-service
  namespace: uber
spec:
  replicas: 1
  selector:
    matchLabels:
      app: driver-service
  template:
    metadata:
      labels:
        app: driver-service
    spec:
      containers:
        - name: driver-service
          image: driver-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: driver-service-configmap
            - secretRef:
                name: driver-postgres-secret
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: jwt-secret
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: driver-postgres-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: driver-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: SPRING_DATA_REDIS_PASSWORD
              value: redispass
            - name: SPRING_RABBITMQ_PASSWORD
              value: guest
          resources:
            limits:
              memory: 768Mi
            requests:
              memory: 384Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5