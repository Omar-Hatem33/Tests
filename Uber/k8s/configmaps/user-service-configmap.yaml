apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-configmap
  namespace: uber
data:
  # PostgreSQL — points to user-postgres Service (ClusterIP headless in same namespace)
  # user-service uses its OWN postgres instance in K8s (unlike docker-compose shared "postgres")
  SPRING_DATASOURCE_URL: jdbc:postgresql://user-postgres:5432/uberdb-users
  # MongoDB — points to mongo Service
  SPRING_DATA_MONGODB_URI: mongodb://root:rootpass@mongo:27017/ubermongo?authSource=admin
  # Redis — points to redis Service
  SPRING_DATA_REDIS_HOST: redis
  SPRING_DATA_REDIS_PORT: "6379"
  # RabbitMQ
  SPRING_RABBITMQ_HOST: rabbitmq
  SPRING_RABBITMQ_PORT: "5672"
  SPRING_RABBITMQ_USERNAME: guest
  # Feign inter-service URLs — all ClusterIP services in same namespace
  FEIGN_USER_SERVICE_URL: http://user-service:8080
  FEIGN_DRIVER_SERVICE_URL: http://driver-service:8080
  FEIGN_RIDE_SERVICE_URL: http://ride-service:8080
  FEIGN_LOCATION_SERVICE_URL: http://location-service:8080
  FEIGN_PAYMENT_SERVICE_URL: http://payment-service:8080
  # JVM tuning
  JAVA_TOOL_OPTIONS: "-XX:TieredStopAtLevel=1 -Xshare:auto"
  SPRING_LAZY_INIT: "true"