apiVersion: v1
kind: ConfigMap
metadata:
  name: driver-service-configmap
  namespace: uber
data:
  # PostgreSQL — driver-service gets its own isolated postgres in K8s
  SPRING_DATASOURCE_URL: jdbc:postgresql://driver-postgres:5432/uberdb-drivers
  # MongoDB
  SPRING_DATA_MONGODB_URI: mongodb://root:rootpass@mongo:27017/ubermongo?authSource=admin
  # Redis
  SPRING_DATA_REDIS_HOST: redis
  SPRING_DATA_REDIS_PORT: "6379"
  # Elasticsearch — driver-service uses ES for driver search (see application.yml)
  SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
  # RabbitMQ
  SPRING_RABBITMQ_HOST: rabbitmq
  SPRING_RABBITMQ_PORT: "5672"
  SPRING_RABBITMQ_USERNAME: guest
  # Feign inter-service URLs
  FEIGN_USER_SERVICE_URL: http://user-service:8080
  FEIGN_DRIVER_SERVICE_URL: http://driver-service:8080
  FEIGN_RIDE_SERVICE_URL: http://ride-service:8080
  FEIGN_LOCATION_SERVICE_URL: http://location-service:8080
  FEIGN_PAYMENT_SERVICE_URL: http://payment-service:8080
  # driver-service has lazy-init disabled in docker-compose
  SPRING_LAZY_INIT: "false"
