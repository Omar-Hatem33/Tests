apiVersion: v1
kind: ConfigMap
metadata:
  name: ride-service-configmap
  namespace: uber
data:
  # PostgreSQL — ride-service has its own isolated postgres (M3 DB isolation)
  # Username is "user" and password is "postgrespass" per docker-compose ride-postgres block
  SPRING_DATASOURCE_URL: jdbc:postgresql://ride-postgres:5432/uberdb-rides
  # MongoDB
  SPRING_DATA_MONGODB_URI: mongodb://root:rootpass@mongo:27017/ubermongo?authSource=admin
  # Redis
  SPRING_DATA_REDIS_HOST: redis
  SPRING_DATA_REDIS_PORT: "6379"
  # Neo4j — ride-service uses Neo4j for ride graph (see application_5.yml)
  # Note: app.yml reads both SPRING_NEO4J_URI and SPRING_DATA_NEO4J_URI
  SPRING_NEO4J_URI: bolt://neo4j:7687
  SPRING_DATA_NEO4J_URI: bolt://neo4j:7687
  SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
  # RabbitMQ
  SPRING_RABBITMQ_HOST: rabbitmq
  SPRING_RABBITMQ_PORT: "5672"
  SPRING_RABBITMQ_USERNAME: guest
  # Feign inter-service URLs
  FEIGN_USER_SERVICE_URL: http://user-service:8080
  FEIGN_DRIVER_SERVICE_URL: http://driver-service:8080
  FEIGN_RIDE_SERVICE_URL: http://ride-service:8080
  FEIGN_LOCATION_SERVICE_URL: http://location-service:8080
  FEIGN_PAYMENT_SERVICE_URL: http://payment-service:8080


