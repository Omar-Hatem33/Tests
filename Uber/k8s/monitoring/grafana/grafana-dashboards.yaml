apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring

data:
  user-dashboard.json: |
    {
      "title": "User Service Dashboard",
      "uid": "user-service-dash",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "tags": ["user-service", "uber"],
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "User Service Error Logs",
          "type": "logs",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "options": { "dedupStrategy": "none", "enableLogDetails": true, "showTime": true, "sortOrder": "Descending" },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{service=\"user-service\"} |= \"ERROR\"",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "User Service Correlation ID Trace",
          "type": "logs",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "options": { "dedupStrategy": "none", "enableLogDetails": true, "showTime": true, "sortOrder": "Descending" },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{service=\"user-service\"} | json | correlationId =~ \".+\"",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "User Service Log Rate by Level",
          "type": "timeseries",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "sum by (level) (count_over_time({service=\"user-service\"}[1m]))",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "User Service HTTP Request Rate",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(http_server_requests_seconds_count{job=\"user-service\"}[5m])",
              "legendFormat": "{{uri}} {{method}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "User Service HTTP Latency Percentiles (P50/P95/P99)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, rate(http_server_requests_seconds_bucket{job=\"user-service\"}[5m]))",
              "legendFormat": "P99",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{job=\"user-service\"}[5m]))",
              "legendFormat": "P95",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.50, rate(http_server_requests_seconds_bucket{job=\"user-service\"}[5m]))",
              "legendFormat": "P50",
              "refId": "C"
            }
          ]
        },
        {
          "id": 6,
          "title": "User Service JVM Heap Memory",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "jvm_memory_used_bytes{job=\"user-service\", area=\"heap\"}",
              "legendFormat": "Heap Used",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "jvm_memory_max_bytes{job=\"user-service\", area=\"heap\"}",
              "legendFormat": "Heap Max",
              "refId": "B"
            }
          ]
        }
      ]
    }

