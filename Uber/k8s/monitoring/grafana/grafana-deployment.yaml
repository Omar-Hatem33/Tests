apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring

spec:
  replicas: 1

  selector:
    matchLabels:
      app: grafana

  template:
    metadata:
      labels:
        app: grafana

    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.2

          ports:
            - containerPort: 3000

          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin

            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning

          volumeMounts:
            - name: storage
              mountPath: /var/lib/grafana

            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources

            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards

            - name: dashboards
              mountPath: /var/lib/grafana/dashboards

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30

          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"

            limits:
              memory: "512Mi"
              cpu: "500m"

      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources

        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider

        - name: dashboards
          configMap:
            name: grafana-dashboards

        - name: storage
          persistentVolumeClaim:
            claimName: grafana-pvc