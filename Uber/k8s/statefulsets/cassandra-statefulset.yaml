apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra
  namespace: uber
spec:
  serviceName: cassandra
  replicas: 1
  selector:
    matchLabels:
      app: cassandra
  template:
    metadata:
      labels:
        app: cassandra
    spec:
      containers:
        - name: cassandra
          image: cassandra:4.1
          ports:
            - containerPort: 9042   # CQL native port — used by location-service
          env:
            - name: CASSANDRA_CLUSTER_NAME
              value: ubercluster
            - name: CASSANDRA_DC
              value: datacenter1
            # Heap capped per §10.8: 256MB heap inside 768Mi container
            - name: MAX_HEAP_SIZE
              value: "256M"
            - name: HEAP_NEWSIZE
              value: "64M"
            # Speed up single-node startup — skips gossip wait
            - name: JVM_OPTS
              value: "-Dcassandra.skip_wait_for_gossip_to_settle=0 -Dcassandra.ring_delay_ms=1000"
          resources:
            limits:
              memory: 1500Mi
            requests:
              memory: 512Mi
          # cqlsh probe: strong check — verifies CQL engine is actually accepting queries
          # Cassandra takes the longest to start (~60s), so long initialDelay is necessary
          readinessProbe:
            exec:
              command: ["cqlsh", "-e", "DESCRIBE KEYSPACES"]
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 10
          livenessProbe:
            exec:
              command: ["cqlsh", "-e", "DESCRIBE KEYSPACES"]
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/cassandra
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi