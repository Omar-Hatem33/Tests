apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: uber
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.19-community
          ports:
            - containerPort: 7474   # HTTP browser UI
              name: http
            - containerPort: 7687   # Bolt protocol (what Spring uses)
              name: bolt
          env:
            - name: NEO4J_AUTH
              value: neo4j/neo4jpass
            - name: NEO4J_PLUGINS
              value: '["apoc"]'
            - name: NEO4J_dbms_memory_heap_initial__size
              value: 256m
            - name: NEO4J_dbms_memory_heap_max__size
              value: 512m
            - name: NEO4J_dbms_memory_pagecache_size
              value: 256m
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 500m
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: standard
        resources:
          requests:
            storage: 5Gi

