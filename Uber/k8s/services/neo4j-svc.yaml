apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: uber
spec:
  clusterIP: None       # headless — required for StatefulSets
  selector:
    app: neo4j
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687

