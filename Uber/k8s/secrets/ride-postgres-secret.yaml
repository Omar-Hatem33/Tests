apiVersion: v1
kind: Secret
metadata:
  name: ride-postgres-secret
  namespace: uber
type: Opaque
# Values are base64-encoded.
# echo -n 'user'           | base64  → dXNlcg==
# echo -n 'postgrespass'   | base64  → cG9zdGdyZXNwYXNz
# echo -n 'uberdb-rides'   | base64  → dWJlcmRiLXJpZGVz
data:
  POSTGRES_USER:     dXNlcg==
  POSTGRES_PASSWORD: cG9zdGdyZXNwYXNz
  POSTGRES_DB:       dWJlcmRiLXJpZGVz